<div class="page" data-name="accueil">

  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-bg"></div>
    <div class="navbar-inner">
      <div class="title">Ma ToDo</div>
      <div class="right">
        <a href="#" class="link icon-only btn-theme-toggle">
          <i class="icon f7-icons theme-icon">moon_stars</i>
        </a>
      </div>
    </div>
  </div>

  <!-- Tabbar bas -->
  <div class="toolbar tabbar toolbar-bottom">
    <div class="toolbar-inner">
      <a href="/" class="tab-link tab-link-active">
        <i class="icon f7-icons">house_fill</i>
        <span class="tabbar-label">Accueil</span>
      </a>
      <a href="/taches/" class="tab-link">
        <i class="icon f7-icons">checkmark_circle</i>
        <span class="tabbar-label">Tâches</span>
      </a>
    </div>
  </div>

  <div class="page-content">

    <!-- Hero -->
    <div class="hero-block">
      <span class="hero-emoji">📋</span>
      <h2 class="hero-title">Bonjour !</h2>
      <p class="hero-sub">Voici un résumé de vos tâches du jour.</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card stat-card--accent">
        <div class="stat-number" id="stat-faites">—</div>
        <div class="stat-label">Faites</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-restantes">—</div>
        <div class="stat-label">Restantes</div>
      </div>
    </div>

    <!-- Bouton CTA -->
    <div class="block">
      <a href="/taches/" class="button button-fill button-large">
        Gérer mes tâches →
      </a>
    </div>

  </div>
</div>
