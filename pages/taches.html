<div class="page" data-name="taches">

  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-bg"></div>
    <div class="navbar-inner">
      <div class="title">Mes tâches</div>
      <div class="right">
        <a href="#" class="link icon-only btn-theme-toggle">
          <i class="icon f7-icons theme-icon">moon_stars</i>
        </a>
      </div>
    </div>
  </div>

  <!-- Tabbar bas -->
  <div class="toolbar tabbar toolbar-bottom">
    <div class="toolbar-inner">
      <a href="/" class="tab-link">
        <i class="icon f7-icons">house_fill</i>
        <span class="tabbar-label">Accueil</span>
      </a>
      <a href="/taches/" class="tab-link tab-link-active">
        <i class="icon f7-icons">checkmark_circle_fill</i>
        <span class="tabbar-label">Tâches</span>
      </a>
    </div>
  </div>

  <div class="page-content">

    <!-- Champ de saisie -->
    <div class="list inset">
      <ul>
        <li class="item-content item-input">
          <div class="item-inner">
            <div class="item-input-wrap">
              <input type="text" id="champ-tache" placeholder="Nouvelle tâche…" />
            </div>
          </div>
        </li>
      </ul>
    </div>

    <!-- Bouton Ajouter -->
    <div class="block">
      <a href="#" class="button button-fill" id="btn-ajouter">Ajouter</a>
    </div>

    

    <!-- Filtres -->
    <div class="filtre-block">
      <div class="segmented">
        <button class="button filtre-btn button-active" data-filtre="toutes">Toutes</button>
        <button class="button filtre-btn" data-filtre="afaire">À faire</button>
        <button class="button filtre-btn" data-filtre="faites">Faites</button>
      </div>
    </div>
    
    <!-- Compteur -->
    <div class="block-header" style="padding: 8px 16px 4px; text-align:center;">
      <p class="compteur">0 tâche(s) restante(s)</p>
    </div>

    <!-- Liste dynamique -->
    <div class="list inset liste-block">
      <ul class="liste-taches">
        <!-- généré par afficher() -->
      </ul>
    </div>

  </div>
</div>
